<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a5568"/>
      <stop offset="100%" stop-color="#718096"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a7e72"/>
      <stop offset="100%" stop-color="#6b6259"/>
    </linearGradient>
    <linearGradient id="bldg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9c8b7a"/>
      <stop offset="100%" stop-color="#7a6b5c"/>
    </linearGradient>
    <linearGradient id="bldg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b8a898"/>
      <stop offset="100%" stop-color="#8a7e72"/>
    </linearGradient>
    <linearGradient id="doorGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c4a3e"/>
      <stop offset="100%" stop-color="#3a2a20"/>
    </linearGradient>
    <linearGradient id="shelterGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1280" height="640" fill="url(#sky)"/>

  <!-- Haze layer -->
  <rect width="1280" height="640" fill="rgba(160,150,140,0.15)"/>

  <!-- Far buildings (silhouettes) -->
  <rect x="0" y="280" width="120" height="260" fill="#5c5248" rx="2"/>
  <rect x="110" y="240" width="100" height="300" fill="#63584e" rx="2"/>
  <rect x="200" y="300" width="80" height="240" fill="#584e44" rx="2"/>
  <rect x="350" y="260" width="130" height="280" fill="#5c5248" rx="2"/>
  <rect x="470" y="290" width="90" height="250" fill="#63584e" rx="2"/>
  <rect x="700" y="250" width="110" height="290" fill="#584e44" rx="2"/>
  <rect x="800" y="280" width="140" height="260" fill="#5c5248" rx="2"/>
  <rect x="930" y="240" width="100" height="300" fill="#63584e" rx="2"/>
  <rect x="1050" y="270" width="120" height="270" fill="#584e44" rx="2"/>
  <rect x="1160" y="300" width="120" height="240" fill="#5c5248" rx="2"/>

  <!-- Far building windows -->
  <g fill="#7eaac4" opacity="0.4">
    <rect x="20" y="300" width="12" height="16" rx="1"/>
    <rect x="50" y="300" width="12" height="16" rx="1"/>
    <rect x="80" y="300" width="12" height="16" rx="1"/>
    <rect x="20" y="330" width="12" height="16" rx="1"/>
    <rect x="50" y="330" width="12" height="16" rx="1"/>
    <rect x="130" y="260" width="12" height="16" rx="1"/>
    <rect x="160" y="260" width="12" height="16" rx="1"/>
    <rect x="130" y="290" width="12" height="16" rx="1"/>
    <rect x="160" y="290" width="12" height="16" rx="1"/>
    <rect x="370" y="280" width="12" height="16" rx="1"/>
    <rect x="400" y="280" width="12" height="16" rx="1"/>
    <rect x="430" y="280" width="12" height="16" rx="1"/>
    <rect x="370" y="310" width="12" height="16" rx="1"/>
    <rect x="430" y="310" width="12" height="16" rx="1"/>
    <rect x="720" y="270" width="12" height="16" rx="1"/>
    <rect x="750" y="270" width="12" height="16" rx="1"/>
    <rect x="720" y="300" width="12" height="16" rx="1"/>
    <rect x="750" y="300" width="12" height="16" rx="1"/>
    <rect x="830" y="300" width="12" height="16" rx="1"/>
    <rect x="860" y="300" width="12" height="16" rx="1"/>
    <rect x="890" y="300" width="12" height="16" rx="1"/>
    <rect x="830" y="330" width="12" height="16" rx="1"/>
    <rect x="890" y="330" width="12" height="16" rx="1"/>
    <rect x="950" y="260" width="12" height="16" rx="1"/>
    <rect x="980" y="260" width="12" height="16" rx="1"/>
    <rect x="950" y="290" width="12" height="16" rx="1"/>
    <rect x="1070" y="290" width="12" height="16" rx="1"/>
    <rect x="1100" y="290" width="12" height="16" rx="1"/>
    <rect x="1130" y="290" width="12" height="16" rx="1"/>
    <rect x="1070" y="320" width="12" height="16" rx="1"/>
    <rect x="1130" y="320" width="12" height="16" rx="1"/>
  </g>

  <!-- Main building left -->
  <rect x="60" y="340" width="260" height="200" fill="url(#bldg1)" rx="3"/>
  <rect x="65" y="345" width="250" height="4" fill="#a0978e" opacity="0.5"/>
  <!-- Windows left building -->
  <g fill="#7eaac4">
    <rect x="85" y="370" width="28" height="35" rx="2"/>
    <rect x="130" y="370" width="28" height="35" rx="2"/>
    <rect x="175" y="370" width="28" height="35" rx="2"/>
    <rect x="220" y="370" width="28" height="35" rx="2"/>
    <rect x="265" y="370" width="28" height="35" rx="2"/>
    <rect x="85" y="420" width="28" height="35" rx="2"/>
    <rect x="130" y="420" width="28" height="35" rx="2"/>
    <rect x="175" y="420" width="28" height="35" rx="2"/>
    <rect x="220" y="420" width="28" height="35" rx="2"/>
    <rect x="265" y="420" width="28" height="35" rx="2"/>
  </g>
  <!-- Window glow -->
  <g fill="rgba(255,220,150,0.2)">
    <rect x="130" y="370" width="28" height="35" rx="2"/>
    <rect x="220" y="420" width="28" height="35" rx="2"/>
  </g>
  <!-- Door left -->
  <rect x="155" y="478" width="45" height="62" fill="url(#doorGrad)" rx="2"/>
  <circle cx="192" cy="510" r="3" fill="#a0522d"/>

  <!-- Main building right -->
  <rect x="960" y="320" width="280" height="220" fill="url(#bldg2)" rx="3"/>
  <rect x="965" y="325" width="270" height="4" fill="#c4bbb2" opacity="0.5"/>
  <!-- Windows right building -->
  <g fill="#7eaac4">
    <rect x="985" y="350" width="28" height="35" rx="2"/>
    <rect x="1030" y="350" width="28" height="35" rx="2"/>
    <rect x="1075" y="350" width="28" height="35" rx="2"/>
    <rect x="1120" y="350" width="28" height="35" rx="2"/>
    <rect x="1165" y="350" width="28" height="35" rx="2"/>
    <rect x="985" y="400" width="28" height="35" rx="2"/>
    <rect x="1030" y="400" width="28" height="35" rx="2"/>
    <rect x="1075" y="400" width="28" height="35" rx="2"/>
    <rect x="1120" y="400" width="28" height="35" rx="2"/>
    <rect x="1165" y="400" width="28" height="35" rx="2"/>
  </g>
  <g fill="rgba(255,220,150,0.2)">
    <rect x="985" y="350" width="28" height="35" rx="2"/>
    <rect x="1075" y="400" width="28" height="35" rx="2"/>
  </g>
  <!-- Door right -->
  <rect x="1080" y="478" width="45" height="62" fill="url(#doorGrad)" rx="2"/>
  <circle cx="1088" cy="510" r="3" fill="#a0522d"/>

  <!-- Pipes and details -->
  <line x1="58" y1="350" x2="58" y2="540" stroke="#7a8288" stroke-width="4"/>
  <line x1="322" y1="340" x2="322" y2="540" stroke="#7a8288" stroke-width="3"/>
  <rect x="50" y="380" width="16" height="20" fill="#d4d8dc" rx="2"/> <!-- AC unit -->
  <rect x="315" y="420" width="14" height="16" fill="#a0a8b0" rx="2"/>
  <line x1="958" y1="330" x2="958" y2="540" stroke="#7a8288" stroke-width="4"/>
  <rect x="950" y="360" width="16" height="20" fill="#d4d8dc" rx="2"/>

  <!-- Ground / Hallway floor -->
  <rect x="0" y="540" width="1280" height="100" fill="url(#ground)"/>
  <!-- Floor tiles -->
  <g stroke="#7a6e62" stroke-width="1" opacity="0.3">
    <line x1="0" y1="560" x2="1280" y2="560"/>
    <line x1="0" y1="580" x2="1280" y2="580"/>
    <line x1="100" y1="540" x2="100" y2="640"/>
    <line x1="250" y1="540" x2="250" y2="640"/>
    <line x1="400" y1="540" x2="400" y2="640"/>
    <line x1="550" y1="540" x2="550" y2="640"/>
    <line x1="700" y1="540" x2="700" y2="640"/>
    <line x1="850" y1="540" x2="850" y2="640"/>
    <line x1="1000" y1="540" x2="1000" y2="640"/>
    <line x1="1150" y1="540" x2="1150" y2="640"/>
  </g>

  <!-- Shelter door (green, glowing) -->
  <g filter="glow">
    <rect x="595" y="440" width="90" height="100" fill="#4a3a30" rx="3"/>
    <rect x="600" y="445" width="80" height="90" fill="url(#doorGrad)" rx="2"/>
    <rect x="600" y="440" width="80" height="6" fill="#2ecc71" rx="1"/>
    <rect x="598" y="535" width="84" height="5" fill="#2ecc71" opacity="0.6" rx="1"/>
    <!-- Shelter sign -->
    <rect x="608" y="458" width="64" height="22" fill="#1a3a1a" rx="3" stroke="#2ecc71" stroke-width="1.5"/>
    <text x="640" y="474" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#2ecc71">מקלט</text>
    <!-- Door handle -->
    <circle cx="668" cy="495" r="4" fill="#a0522d"/>
    <!-- Green glow on ground -->
    <ellipse cx="640" cy="542" rx="60" ry="10" fill="#2ecc71" opacity="0.15"/>
  </g>

  <!-- Running player (Avi in blue tracksuit) -->
  <g transform="translate(470, 468)" filter="softShadow">
    <!-- Shadow on ground -->
    <ellipse cx="14" cy="72" rx="18" ry="5" fill="rgba(0,0,0,0.2)"/>
    <!-- Left leg (back, running pose) -->
    <rect x="4" y="42" width="8" height="22" fill="#3a6aaf" rx="3" transform="rotate(-20, 8, 42)"/>
    <rect x="0" y="60" width="8" height="8" fill="#4a4a4a" rx="2" transform="rotate(-20, 4, 60)"/>
    <!-- Right leg (front, extended) -->
    <rect x="16" y="42" width="8" height="22" fill="#4a7abf" rx="3" transform="rotate(15, 20, 42)"/>
    <rect x="22" y="62" width="8" height="8" fill="#4a4a4a" rx="2" transform="rotate(15, 26, 62)"/>
    <!-- Body (tracksuit) -->
    <rect x="4" y="18" width="20" height="26" fill="#4a7abf" rx="4"/>
    <!-- Arms running -->
    <rect x="-4" y="20" width="8" height="18" fill="#4a7abf" rx="3" transform="rotate(25, 0, 20)"/>
    <rect x="24" y="20" width="8" height="18" fill="#3a6aaf" rx="3" transform="rotate(-30, 28, 20)"/>
    <!-- Hands -->
    <circle cx="-2" cy="40" r="4" fill="#d4a878" transform="rotate(25, 0, 20)"/>
    <circle cx="30" cy="40" r="4" fill="#d4a878" transform="rotate(-30, 28, 20)"/>
    <!-- Head -->
    <circle cx="14" cy="12" r="11" fill="#d4a878"/>
    <!-- Hair (short messy) -->
    <path d="M4,8 Q6,0 14,-1 Q22,0 24,8 Q22,4 14,3 Q6,4 4,8Z" fill="#3a2a1a"/>
    <!-- Eyes -->
    <circle cx="10" cy="11" r="1.5" fill="#2a1a0a"/>
    <circle cx="18" cy="11" r="1.5" fill="#2a1a0a"/>
    <!-- Determined expression -->
    <path d="M10,16 Q14,18 18,16" stroke="#b88a60" stroke-width="1.2" fill="none"/>
  </g>

  <!-- Missile in sky -->
  <g transform="translate(850, 120) rotate(65)">
    <ellipse cx="0" cy="0" rx="8" ry="22" fill="#5c636a"/>
    <polygon points="-8,-20 0,-32 8,-20" fill="#5c636a"/>
    <!-- Flame trail -->
    <ellipse cx="0" cy="24" rx="5" ry="12" fill="#e74c3c" opacity="0.7"/>
    <ellipse cx="0" cy="30" rx="3" ry="8" fill="#f39c12" opacity="0.5"/>
    <!-- Smoke trail -->
    <circle cx="2" cy="42" r="6" fill="rgba(160,150,140,0.3)"/>
    <circle cx="-3" cy="55" r="8" fill="rgba(160,150,140,0.2)"/>
    <circle cx="4" cy="70" r="10" fill="rgba(160,150,140,0.12)"/>
  </g>

  <!-- Second missile (smaller, further) -->
  <g transform="translate(280, 80) rotate(72)" opacity="0.5">
    <ellipse cx="0" cy="0" rx="5" ry="15" fill="#5c636a"/>
    <polygon points="-5,-13 0,-22 5,-13" fill="#5c636a"/>
    <ellipse cx="0" cy="17" rx="3" ry="8" fill="#e74c3c" opacity="0.5"/>
    <circle cx="0" cy="30" r="5" fill="rgba(160,150,140,0.2)"/>
  </g>

  <!-- Explosion glow in distance -->
  <circle cx="150" cy="330" r="25" fill="#f39c12" opacity="0.15"/>
  <circle cx="150" cy="330" r="15" fill="#e74c3c" opacity="0.1"/>

  <!-- Title -->
  <g filter="textGlow">
    <text x="640" y="180" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="96" font-weight="bold" fill="#f5f0eb" letter-spacing="2">
      מקלטים
    </text>
  </g>
  <text x="640" y="230" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" fill="#c4bbb2" letter-spacing="8">
    SHELTERS
  </text>

  <!-- Subtitle -->
  <text x="640" y="280" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="18" fill="#a0978e">
    Run. Dodge. Prove you're Israeli. Find shelter.
  </text>

  <!-- Timer HUD element (decorative) -->
  <g transform="translate(540, 570)">
    <rect x="0" y="0" width="200" height="36" rx="8" fill="rgba(0,0,0,0.45)"/>
    <text x="20" y="25" font-family="'Courier New', monospace" font-size="14" fill="#e74c3c" font-weight="bold">TIME</text>
    <text x="75" y="25" font-family="'Courier New', monospace" font-size="20" fill="#f5f0eb" font-weight="bold">1:47</text>
    <text x="120" y="25" font-family="'Courier New', monospace" font-size="14" fill="#c4bbb2">FLOOR 3</text>
  </g>

  <!-- Graffiti on left building -->
  <text x="90" y="465" font-family="Arial, sans-serif" font-size="14" fill="#c44a4a" opacity="0.5" transform="rotate(-5, 90, 465)">אין מקלט</text>

  <!-- Warning tape on right building -->
  <g opacity="0.6">
    <line x1="1060" y1="476" x2="1145" y2="472" stroke="#f1c40f" stroke-width="6"/>
    <line x1="1060" y1="476" x2="1145" y2="472" stroke="#1a1510" stroke-width="1" stroke-dasharray="8,8"/>
  </g>

  <!-- Laundry line between buildings -->
  <path d="M320,365 Q640,390 960,360" stroke="#3a3a3a" stroke-width="1.5" fill="none"/>
  <rect x="480" y="373" width="16" height="22" fill="#e8d5c4" rx="1" transform="rotate(5, 488, 384)"/>
  <rect x="560" y="378" width="18" height="20" fill="#c4d4e8" rx="1" transform="rotate(-3, 569, 388)"/>
  <rect x="700" y="372" width="14" height="24" fill="#e8c4c4" rx="1" transform="rotate(4, 707, 384)"/>

  <!-- Antenna on far building -->
  <line x1="420" y1="260" x2="420" y2="220" stroke="#5a5a5a" stroke-width="2"/>
  <line x1="410" y1="230" x2="430" y2="230" stroke="#5a5a5a" stroke-width="1.5"/>
  <line x1="415" y1="240" x2="425" y2="240" stroke="#5a5a5a" stroke-width="1"/>

  <!-- Cable -->
  <path d="M322,380 Q340,395 420,378" stroke="#3a3a3a" stroke-width="1" fill="none"/>
</svg>
